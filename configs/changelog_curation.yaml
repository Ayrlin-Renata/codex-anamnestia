      - weapon_details.durable_value
      - weapon_details.attack_power
      - weapon_details.magic_attack_power
    summarize_fields:
      category_id: "Category changed"
      accessory_details: "Accessory details changed"
      armor_details: "Armor details changed"
      food_details: "Food details changed"
      housing_piece_details: "Housing details changed"
      implement_details.durable_value: "Durability changed"
      material_details.freshness: "Freshness changed"
      tool_details: "Tool details changed"
      weapon_details: "Weapon details changed"
    show_additional_changes: true
    field_names:
      name_en: "Name (EN)"
      name_ja: "Name (JA)"
      category_id: "Category ID"
      sort_id: "Sort ID"
      category_name_en: "Category Name (EN)"
      category_name_ja: "Category Name (JA)"
      icon_resource_name: "Icon Resource"
      description_en: "Description (EN)"
      description_ja: "Description (JA)"
      accessory_details.system_type_name: "System Type"
      accessory_details.accessory_type: "Accessory Type"
      accessory_details.item_rank: "Rank"
      accessory_details.weight: "Weight"
      accessory_details.durable_value: "Durability"
      accessory_details.defense: "Defense"
      accessory_details.magic_defense: "Magic Defense"
      armor_details.armor_type: "Armor Type"
      armor_details.item_rank: "Rank"
      armor_details.weight: "Weight"
      armor_details.durable_value: "Durability"
      armor_details.defense_power: "Defense"
      armor_details.magic_defense: "Magic Defense"
      food_details.food_point: "Food Points"
      food_details.water_point: "Water Points"
      food_details.freshness: "Freshness"
      housing_piece_details.piece_type: "Piece Type"
      housing_piece_details.hp: "HP"
      housing_piece_details.physics_defense: "Physics Defense"
      housing_piece_details.magic_defense: "Magic Defense"
      housing_piece_details.mood: "Mood"
      implement_details.durable_value: "Durability"
      material_details.freshness: "Freshness"
      tool_details.tool_type: "Tool Type"
      tool_details.tool_category_id: "Tool Category"
      tool_details.item_rank: "Rank"
      tool_details.weight: "Weight"
      tool_details.durable_value: "Durability"
      tool_details.attack: "Attack"
      tool_details.energy: "Energy"
      tool_details.breaking: "Breaking Power"
      tool_details.drop_multiplier: "Drop Multiplier"
      weapon_details.weapon_type_id: "Weapon Type"
      weapon_details.item_rank: "Rank"
      weapon_details.weight: "Weight"
      weapon_details.durable_value: "Durability"
      weapon_details.attack_power: "Attack Power"
      weapon_details.sub_element: "Sub Element"
      weapon_details.sub_element_attack_power: "Sub Element Attack"
    include_additions: true
    include_removals: true

  recipe_craft_spec:
    display_name: "Crafting Recipes"
    hide_id: true
    link_context: "item"
    important_fields:
      - result_amount
      - observation_point
      - required_token
      - exp
    sort_field: "id"
    custom_renderers:
      materials: "recipe_materials"
      byproducts: "recipe_byproducts"
    summarize_fields:
      materials: "Recipe materials changed"
      byproducts: "Byproducts changed"
      recipe_groups: "Recipe groups changed"
    field_names:
      result_item_id: "Result Item"
      result_amount: "Amount Produced"
      observation_point: "Obs Points"
      required_token: "Required Tokens"
      exp: "Experience"
    include_additions: true
    include_removals: true

# Global transformations for specific fields across any spec/input
transformations:
  obtain_type:
    1: "On Death"
  item_category:
    10102: "Tool"
    10105: "Consumable"

# You can also add specific raw input file rules if needed
inputs:
  master_creature.dat:
    important_fields:
      - hp
      - attack
      - defense
