sources:
  - name: "facility_data"
    type: "local_file"
    path_type: "manual"
    path: "facility_names.json"
    decoder: "decode_json"
    strategy: "lookup"
    key: "id"

primary_source: "facility_data"

output_structure:
  id: { from: "facility_data", field: "id" }
  name_en: { from: "facility_data", field: "name_en" }
  name_ja: { from: "facility_data", field: "name_ja" }