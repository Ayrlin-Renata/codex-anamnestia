# Specification for resolving a union of all item types.

resolution_strategy: "union"

# List of all sources that contain primary item definitions.
# The pipeline will gather all unique IDs from these sources.
union_sources:
  - { name: "master_item_common", id_field: "itemId" }
  - { name: "master_accessory", id_field: "accessoryId" }
  - { name: "master_armor", id_field: "armorId" }
  - { name: "master_bullet", id_field: "bulletId" }
  - { name: "master_cultivation_fertilizer", id_field: "itemId" }
  - { name: "master_element", id_field: "id" }
  - { name: "master_food", id_field: "foodId" }
  - { name: "master_implement", id_field: "implementId" }
  - { name: "master_material", id_field: "materialId" }
  - { name: "master_point_book", id_field: "id" }
  - { name: "master_skill_book", id_field: "id" }
  - { name: "master_smelting_fuel", id_field: "fuelItemId" }
  - { name: "master_tool", id_field: "toolId" }
  - { name: "master_trap", id_field: "trapId" }
  - { name: "master_vehicle_item", id_field: "itemId" }
  - { name: "master_weapon", id_field: "weaponId" }
  - { name: "master_housing_piece", id_field: "housingPieceId" }
  - { name: "virtual_missing_items", id_field: "id" }

# Full definition of all data sources required for this spec.
sources:
  - { name: "master_item_common", type: "local_file", path_type: "survival", path: "master_item_common.dat", decoder: "decode_survival_dat", strategy: "lookup", key: "itemId" }
  - { name: "master_accessory", type: "local_file", path_type: "survival", path: "master_accessory.dat", decoder: "decode_survival_dat", strategy: "group_by", key: "accessoryId" }
  - { name: "master_armor", type: "local_file", path_type: "survival", path: "master_armor.dat", decoder: "decode_survival_dat", strategy: "group_by", key: "armorId" }
  - { name: "master_bullet", type: "local_file", path_type: "survival", path: "master_bullet.dat", decoder: "decode_survival_dat", strategy: "group_by", key: "bulletId" }
  - { name: "master_cultivation_fertilizer", type: "local_file", path_type: "survival", path: "master_cultivation_fertilizer.dat", decoder: "decode_survival_dat", strategy: "group_by", key: "itemId" }
  - { name: "master_element", type: "local_file", path_type: "survival", path: "master_element.dat", decoder: "decode_survival_dat", strategy: "group_by", key: "id" }
  - { name: "master_food", type: "local_file", path_type: "survival", path: "master_food.dat", decoder: "decode_survival_dat", strategy: "group_by", key: "foodId" }
  - { name: "master_implement", type: "local_file", path_type: "survival", path: "master_implement.dat", decoder: "decode_survival_dat", strategy: "group_by", key: "implementId" }
  - { name: "master_material", type: "local_file", path_type: "survival", path: "master_material.dat", decoder: "decode_survival_dat", strategy: "group_by", key: "materialId" }
  - { name: "master_point_book", type: "local_file", path_type: "survival", path: "master_point_book.dat", decoder: "decode_survival_dat", strategy: "group_by", key: "id" }
  - { name: "master_skill_book", type: "local_file", path_type: "survival", path: "master_skill_book.dat", decoder: "decode_survival_dat", strategy: "group_by", key: "id" }
  - { name: "master_smelting_fuel", type: "local_file", path_type: "survival", path: "master_smelting_fuel.dat", decoder: "decode_survival_dat", strategy: "group_by", key: "fuelItemId" }
  - { name: "master_tool", type: "local_file", path_type: "survival", path: "master_tool.dat", decoder: "decode_survival_dat", strategy: "group_by", key: "toolId" }
  - { name: "master_trap", type: "local_file", path_type: "survival", path: "master_trap.dat", decoder: "decode_survival_dat", strategy: "group_by", key: "trapId" }
  - { name: "master_vehicle_item", type: "local_file", path_type: "survival", path: "master_vehicle_item.dat", decoder: "decode_survival_dat", strategy: "group_by", key: "itemId" }
  - { name: "master_weapon", type: "local_file", path_type: "survival", path: "master_weapon.dat", decoder: "decode_survival_dat", strategy: "group_by", key: "weaponId" }
  - { name: "master_housing_piece", type: "local_file", path_type: "survival", path: "master_housing_piece.dat", decoder: "decode_survival_dat", strategy: "group_by", key: "housingPieceId" }
  - { name: "virtual_missing_items", type: "virtual", generator: "generate_missing_items", strategy: "lookup", key: "id" }
  - { name: "system_types", type: "local_file", path_type: "manual", path: "system_types.json", decoder: "decode_json", strategy: "lookup" }

  - name: "master_mood_type"
    type: "local_file"
    path_type: "survival"
    path: "master_mood_type.dat"
    decoder: "decode_survival_dat"
    strategy: "lookup"
    key: "moodTypeId"

  - name: "master_item_category"
    type: "local_file"
    path_type: "survival"
    path: "master_item_category.dat"
    decoder: "decode_survival_dat"
    strategy: "lookup"
    key: "itemCategoryId"

  - name: "master_text_EN"
    type: "local_file"
    path_type: "survival"
    path: "master_text_EN.dat"
    decoder: "decode_survival_dat"

  - name: "master_text_JA"
    type: "local_file"
    path_type: "survival"
    path: "master_text_JA.dat"
    decoder: "decode_survival_dat"

  - name: "item_images"
    type: "local_file"
    path_type: "manual"
    path: "item_images.json"
    decoder: "decode_json"
    strategy: "lookup"
    key: "id"

